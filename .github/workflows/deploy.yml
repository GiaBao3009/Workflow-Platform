name: Build and Push Docker Image

on:
  push:
    branches:
      - master  # <-- Đã sửa thành master theo đúng repo của bạn
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: baoldz
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./hello-temporal       # <-- Chỉ định Docker chạy trong thư mục này
          file: ./hello-temporal/Dockerfile # <-- Chỉ đúng đường dẫn tới Dockerfile
          push: true
          tags: |
            baoldz/workflow-platform:latest
            baoldz/workflow-platform:${{ github.sha }}
